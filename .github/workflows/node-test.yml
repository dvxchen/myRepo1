name: 测试并发送结果邮件
on:
  schedule:
    - cron: '0 18 * * *' # 北京时间凌晨2点运行
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装项目依赖
        run: npm install

      - name: 执行测试
        id: run_test
        run: npm test
        continue-on-error: true

      # 核心修改：使用稳定的 mailer-action 发送邮件
      - name: 发送测试结果邮件
        uses: fwalti/mailer-action@v1
        with:
          # SMTP 核心配置（从仓库机密变量读取）
          smtp_host: ${{ secrets.EMAIL_HOST }}
          smtp_port: ${{ secrets.EMAIL_PORT }}
          smtp_username: ${{ secrets.EMAIL_USER }}
          smtp_password: ${{ secrets.EMAIL_PASSWORD }}
          smtp_secure: true # 启用 SSL（465 端口必须设为 true）
          # 邮件内容
          from: "GitHub Actions <${{ secrets.EMAIL_USER }}>"
          to: ${{ secrets.EMAIL_TO }}
          subject: "【GitHub Actions】${{ github.repository }} 测试结果：${{ job.status }}"
          body: |
            ### 测试运行结果
            状态：${{ job.status == 'success' && '✅ 成功' || '❌ 失败' }}
            仓库：${{ github.repository }}
            触发方式：${{ github.event_name == 'schedule' && '定时任务' || github.event_name == 'push' && '代码推送' || '手动触发' }}
            运行链接：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            提交信息：${{ github.event.head_commit.message || '无' }}
            运行时间：${{ github.run_at }}
        if: always() # 无论结果如何都发送邮件
