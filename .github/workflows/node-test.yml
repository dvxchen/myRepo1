name: Cypress 捕获详细测试结果
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  cypress-test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm install

      # 安装 Cypress 系统依赖
      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libgbm-dev libnss3 libxss1 xvfb

      # 提前创建报告目录（避免写入失败）
      - name: 创建报告目录
        run: |
          mkdir -p ./cypress/results/json
          mkdir -p ./cypress/results/xml
          mkdir -p ./cypress/results/html
          mkdir -p ./cypress/screenshots
          mkdir -p ./cypress/videos

      # 运行 Cypress 测试（生成报告）
      - name: 执行 Cypress 测试
        run: npm test
        continue-on-error: true # 失败不中断
        env:
          CYPRESS_HEADLESS: true

      # （可选）生成 HTML 报告
      - name: 生成 HTML 报告
        run: |
          npm run report:merge
          npm run report:generate

      # 上传报告/截图/视频到 Actions（方便下载排查）
      - name: 上传测试结果
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results
          path: |
            ./cypress/results
            ./cypress/screenshots
            ./cypress/videos
        if: always()

      # 解析报告并输出关键结果（供邮件/通知使用）
      - name: 解析测试结果
        id: parse-results
        run: |
          # 读取 JSON 报告，提取失败数/通过数
          FAILURES=$(cat ./cypress/results/json/*.json | jq '.stats.failures')
          PASSES=$(cat ./cypress/results/json/*.json | jq '.stats.passes')
          TOTAL=$(cat ./cypress/results/json/*.json | jq '.stats.tests')
          
          # 设置为 Actions 输出变量，供后续步骤使用
          echo "failures=$FAILURES" >> $GITHUB_OUTPUT
          echo "passes=$PASSES" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
        continue-on-error: true

      # 示例：打印结果（可替换为发送邮件/钉钉通知）
      - name: 打印测试结果
        run: |
          echo "总用例数：${{ steps.parse-results.outputs.total }}"
          echo "通过数：${{ steps.parse-results.outputs.passes }}"
          echo "失败数：${{ steps.parse-results.outputs.failures }}"
