name: Cypress 端到端测试
on:
  push:
    branches: [ main ]

jobs:
  cypress-test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装项目依赖
        run: npm install  # 用 npm install 避免锁文件同步问题

      # 关键：简化系统依赖安装命令（删除 libasound2 等无效包）
      - name: 安装 Cypress 核心系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libgbm-dev libnss3 libxss1 xvfb

      - name: 执行 Cypress 测试（无头模式）
        run: npm test
        env:
          # 强制无头运行，避免图形化依赖问题
          CYPRESS_HEADLESS: true
