# .github/workflows/test-and-email.yml
name: Cypress 定时测试 + 结果邮件通知
# 触发条件：定时 + 手动触发 + 代码推送
on:
  # 定时运行配置（关键！）
  # UTC 时间 12:00 = 北京时间 20:00；可根据需求修改
  # 格式：分 时 日 月 周（Cron 表达式）
  schedule:
    - cron: '0 14 * * *' # 每天 UTC 14点（北京时间22点）运行
    # 可选：每周一到周五 凌晨2点（UTC 18点）运行
    # - cron: '0 18 * * 1-5'
  # 手动触发（方便测试）
  workflow_dispatch:
  # 代码推送到 main 分支时触发（可选保留）
  push:
    branches: [ main ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码到 GitHub Actions 运行环境
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Node.js（适配你的项目版本）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. 安装项目依赖（包括 Cypress）
      - name: Install dependencies
        run: npm ci

      # 4. 运行 Cypress 并生成 JSON 报告
      # 关键：通过 --reporter 指定 JSON 报告格式，--reporter-options 指定输出路径
      - name: Run Cypress tests and generate JSON report
        run: npx cypress run --reporter json --reporter-options "file=./cypress/reports/test-results.json"

      # 5. 读取并处理 JSON 报告（核心步骤）
      - name: Process Cypress JSON report
        id: cypress-json # 给步骤命名，方便后续引用输出
        run: |
          # 方式1：用 jq 解析 JSON（GitHub Actions 环境已预装 jq）
          # 提取测试总数、失败数、通过数
          total_tests=$(jq '.totalTests' ./cypress/reports/test-results.json)
          failed_tests=$(jq '.totalFailed' ./cypress/reports/test-results.json)
          passed_tests=$(jq '.totalPassed' ./cypress/reports/test-results.json)

          # 输出到日志，方便查看
          echo "Total tests: $total_tests"
          echo "Failed tests: $failed_tests"
          echo "Passed tests: $passed_tests"

          # 方式2：将解析结果存入 GitHub Actions 环境
