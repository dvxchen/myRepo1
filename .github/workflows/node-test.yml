name: 定时运行 Cypress 测试
on:
  schedule:
    # 北京时间每天凌晨 2 点运行（UTC 18 点）
    - cron: '0 18 * * *'
  workflow_dispatch: # 手动触发

jobs:
  cypress-test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install

      - name: 安装 Cypress 核心依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libgbm-dev libnss3 libxss1 xvfb

      - name: 执行 Cypress 测试（无头模式）
        run: npm test
        env:
          CYPRESS_HEADLESS: true
