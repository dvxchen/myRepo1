# .github/workflows/test-and-email.yml
name: Cypress 定时测试 + 结果邮件通知
# 触发条件：定时 + 手动触发 + 代码推送
on:
  # 定时运行配置（关键！）
  # UTC 时间 12:00 = 北京时间 20:00；可根据需求修改
  # 格式：分 时 日 月 周（Cron 表达式）
  schedule:
    - cron: '0 12 * * *' # 每天 UTC 12点（北京时间20点）运行
    # 可选：每周一到周五 凌晨2点（UTC 18点）运行
    # - cron: '0 18 * * 1-5'
  # 手动触发（方便测试）
  workflow_dispatch:
  # 代码推送到 main 分支时触发（可选保留）
  push:
    branches: [ main ]


jobs:
  cypress-test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm install

      # 安装 Cypress 系统依赖
      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libgbm-dev libnss3 libxss1 xvfb

      # 仅创建单层 results 目录（无需 json/html 子目录）
      - name: 创建报告目录
        run: mkdir -p ./cypress/results

      # 运行 Cypress，生成单个 JSON 报告
      - name: 执行 Cypress 测试
        run: npm test
        continue-on-error: true # 测试失败不中断
        env:
          CYPRESS_HEADLESS: true

      # 上传报告（供排查）
      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results
          path: ./cypress/results
        if: always()

      # 解析原生 JSON 报告（关键：直接读取单个文件）
      - name: 解析测试结果
        id: parse-results
        run: |
          # 定义报告文件路径
          REPORT_FILE="./cypress/results/cypress-results.json"
          
          # 初始化默认值
          FAILURES=0
          PASSES=0
          TOTAL=0
          
          # 检查文件是否存在，存在则解析
          if [ -f "$REPORT_FILE" ]; then
            # 用 jq 解析原生 JSON 报告（Ubuntu 内置 jq）
            TOTAL=$(jq '.tests' "$REPORT_FILE")
            PASSES=$(jq '.passes' "$REPORT_FILE")
            FAILURES=$(jq '.failures' "$REPORT_FILE")
          fi
          
          # 设置输出变量，供邮件脚本使用
          echo "failures=$FAILURES" >> $GITHUB_OUTPUT
          echo "passes=$PASSES" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
        continue-on-error: true

      # 发送邮件（使用解析后的结果）
      - name: 发送测试结果邮件
        run: node send-email.js
        env:
          # 邮箱配置
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # 测试结果
          CYPRESS_TOTAL: ${{ steps.parse-results.outputs.total }}
          CYPRESS_PASSES: ${{ steps.parse-results.outputs.passes }}
          CYPRESS_FAILURES: ${{ steps.parse-results.outputs.failures }}
          # GitHub 基础信息
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        if: always()
