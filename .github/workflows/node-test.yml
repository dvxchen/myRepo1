name: Cypress 测试（简化版）
on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      # 官方 Cypress Action：自动配置 Node + 系统依赖 + Cypress
      - name: Cypress 测试
        uses: cypress-io/github-action@v6
        with:
          # 执行 Cypress 运行命令
          command: npm test
          # 显示测试日志
          start: echo "启动测试"
