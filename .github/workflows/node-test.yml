name: Node.js 自动化测试
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install

      # 关键：安装 Cypress 依赖的系统库（Ubuntu 环境）
      - name: 安装 Cypress 系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk2.0-0 libgtk-3-0 libgbm-dev libnotify-dev libgconf-2-4 libnss3 libxss1 libasound2 libxtst6 xauth xvfb

      - name: 执行 Cypress 测试（无头模式）
        run: npm test
        env:
          # 配置 Cypress 无头运行
          CYPRESS_BASE_URL: https://www.baidu.com
